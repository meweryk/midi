<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>О программе — MIDI Колокола</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; color: #222; padding-top: 56px; }
    .markdown-body { max-width: 900px; margin: 0 auto; padding: 24px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .markdown-body img { max-width: 100%; height: auto; }
    pre { overflow: auto; background: #0d1117; color: #c9d1d9; padding: 12px; border-radius: 6px; }
    code { background: rgba(27,31,35,.05); padding: .2em .4em; border-radius: 6px; }
    @media (max-width: 576px) { .markdown-body { padding: 16px; margin: 8px; } }
    .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1030; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark top-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">MIDI Колокола</a>
      <a class="btn btn-outline-light" href="index.html">Назад</a>
    </div>
  </nav>

  <main class="py-4">
    <div id="content" class="markdown-body container"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // Настройки marked (безопасная базовая конфигурация)
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        gfm: true,
        breaks: false,
        headerIds: true,
      });
    }

    fetch('./README.md')
      .then(r => {
        if (!r.ok) throw new Error('Не удалось загрузить README.md');
        return r.text();
      })
      .then(md => {
        const html = marked.parse(md || '');
        document.getElementById('content').innerHTML = html;
        // Простая обработка внешних ссылок и якорей
        document.querySelectorAll('#content a').forEach(a => {
          const href = a.getAttribute('href');
          if (href && (href.startsWith('http') || href.startsWith('//'))) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
          }
        });
      })
      .catch(err => {
        document.getElementById('content').innerHTML = '<div class="alert alert-danger">Ошибка загрузки файла: ' + (err.message || '') + '</div>';
      });
  </script>
</body>
</html>
